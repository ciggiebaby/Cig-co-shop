<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery — CIG &amp; CO.</title>
<meta name="description" content="The CIG &amp; CO. lookbook — paisley pieces, editorial shots, and the story behind the brand." />
<link rel="canonical" href="https://cigcompany.com/gallery" />
<meta property="og:site_name" content="CIG &amp; CO." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Gallery — CIG &amp; CO." />
<meta property="og:description" content="The CIG &amp; CO. lookbook — paisley pieces, editorial shots, and the story behind the brand." />
<meta property="og:url" content="https://cigcompany.com/gallery" />
<meta property="og:image" content="https://cigcompany.com/assets/og-card.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Gallery — CIG &amp; CO." />
<meta name="twitter:description" content="The CIG &amp; CO. lookbook — paisley pieces, editorial shots, and the story behind the brand." />
<meta name="twitter:image" content="https://cigcompany.com/assets/og-card.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;1,6..96,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="wordmark">CIG <span>&amp;</span> CO.</a>
    <nav class="main-nav">
      <a href="index.html#shop">Shop</a>
      <a href="index.html#about">About</a>
      <a href="gallery.html">Gallery</a>
      <a href="arcade.html">Arcade</a>
    </nav>
    <button id="cart-toggle" class="cart-toggle" aria-label="Open cart">
      BAG <span id="cart-count">0</span>
    </button>
  </div>
</header>

<section class="page-intro reveal">
  <p class="hero-kicker">Gallery</p>
  <p class="hero-tagline">A look at the art behind the paisley — added as new work is finished.</p>
</section>

<section class="gallery-video reveal">
  <div class="gallery-video-frame">
    <iframe
      src="https://www.youtube.com/embed/7z4-W6NlreE"
      title="Visualizer — Latest Single"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
  </div>
</section>

<section class="shop">
  <div id="gallery-grid" class="product-grid"></div>
</section>

<footer class="site-footer">
  <p>&copy; <span id="year"></span> CIG &amp; CO. All rights reserved.</p>
</footer>

<!-- Gallery lightbox -->
<div id="gallery-modal" class="modal" aria-hidden="true">
  <div class="modal-inner">
    <button class="modal-close" id="gallery-modal-close" aria-label="Close">&times;</button>
    <div id="gallery-modal-content"></div>
  </div>
</div>

<!-- Cart drawer -->
<div id="cart-drawer" class="cart-drawer" aria-hidden="true">
  <div class="cart-drawer-header">
    <h3>Your Bag</h3>
    <button id="cart-close" aria-label="Close cart">&times;</button>
  </div>
  <div id="cart-items" class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-subtotal">
      <span>Subtotal</span>
      <span id="cart-subtotal-amount">$0.00</span>
    </div>
    <button id="checkout-btn" class="btn btn-gold btn-full">Checkout</button>
  </div>
</div>
<div id="cart-backdrop" class="backdrop"></div>

<!-- Checkout modal -->
<div id="checkout-modal" class="modal" aria-hidden="true">
  <div class="modal-inner">
    <button class="modal-close" id="checkout-close" aria-label="Close">&times;</button>
    <div class="checkout-content">
      <h3>Checkout</h3>
      <div id="checkout-summary" class="checkout-summary"></div>

      <div class="promo-row">
        <input type="text" id="promo-input" placeholder="Promo code" />
        <button class="btn btn-outline btn-promo" id="promo-apply">Apply</button>
      </div>
      <p id="promo-message" class="promo-message"></p>

      <div class="checkout-fields">
        <input type="email" id="checkout-email" placeholder="Email" required />
        <input type="text" id="checkout-name" placeholder="Full name" required />
        <input type="text" id="checkout-address" placeholder="Shipping address" required />
        <input type="text" id="checkout-city" placeholder="City, State, ZIP" required />
        <label class="checkbox-row">
          <input type="checkbox" id="checkout-optin" />
          <span>Keep me posted on drops &amp; discounts (optional)</span>
        </label>
      </div>

      <h4>Choose payment method</h4>
      <div class="payment-options">
        <button class="btn btn-outline pay-btn" data-method="stripe">Pay with Card</button>
        <button class="btn btn-outline pay-btn" data-method="paypal">Pay with PayPal</button>
        <button class="btn btn-outline pay-btn pay-crypto" data-method="crypto">Pay with Crypto (20% off)</button>
      </div>
      <p id="checkout-error" class="checkout-error"></p>
      <p id="checkout-loading" class="checkout-loading" hidden>Redirecting to secure checkout&hellip;</p>
    </div>
  </div>
</div>

<!-- Hidden form so Netlify's build-time crawler registers the "email-list" form. -->
<form name="email-list" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="email" name="email" />
  <input type="text" name="source" />
  <input type="text" name="bot-field" />
</form>

<script src="products.js"></script>
<script src="gallery-data.js"></script>
<script src="promo.js"></script>
<script src="email-list.js"></script>
<script src="cart.js"></script>
<script src="app.js"></script>
<script src="gallery.js"></script>
<script src="effects.js"></script>
</body>
</html>
